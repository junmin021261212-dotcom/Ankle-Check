<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>발목 불안정성(CAI) 자가 진단</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background: #eef2f7;
            min-height: 100vh;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 30px 16px;
        }

        .card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            max-width: 620px;
            width: 100%;
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #a01830, #6b0f20);
            color: white;
            padding: 28px 30px 24px;
            text-align: center;
        }
        .header h2 { font-size: 1.4rem; font-weight: 700; margin-bottom: 6px; }
        .header p { font-size: 0.82rem; opacity: 0.85; }

        .progress-bar-wrap {
            background: rgba(255,255,255,0.25);
            border-radius: 99px;
            height: 6px;
            margin-top: 16px;
        }
        .progress-bar-fill {
            background: white;
            height: 6px;
            border-radius: 99px;
            transition: width 0.4s ease;
            width: 0%;
        }
        .progress-label {
            font-size: 0.75rem;
            opacity: 0.8;
            margin-top: 6px;
            text-align: right;
        }

        .body { padding: 24px 28px 28px; }

        .question {
            margin-bottom: 22px;
            padding-bottom: 20px;
            border-bottom: 1px solid #f0f0f0;
            animation: fadeIn 0.3s ease;
        }
        .question:last-child { border-bottom: none; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .question-text {
            font-size: 0.95rem;
            font-weight: 600;
            color: #1a1a2e;
            margin-bottom: 12px;
            line-height: 1.5;
        }
        .question-num {
            display: inline-block;
            background: #8b1a2f;
            color: white;
            font-size: 0.72rem;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 99px;
            margin-right: 6px;
            vertical-align: middle;
        }

        .options {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 8px;
        }

        .option-label {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            padding: 10px 8px;
            border: 2px solid #e0e7ef;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.18s ease;
            text-align: center;
            font-size: 0.78rem;
            color: #555;
            line-height: 1.3;
            background: #fafbfc;
            user-select: none;
        }
        .option-label:hover {
            border-color: #8b1a2f;
            background: #fdf0f0;
            color: #8b1a2f;
        }
        .option-label input[type="radio"] { display: none; }
        .option-label.selected {
            border-color: #8b1a2f;
            background: #8b1a2f;
            color: white;
            font-weight: 700;
        }
        .score-badge {
            font-size: 0.68rem;
            opacity: 0.75;
        }
        .option-label.selected .score-badge { opacity: 0.9; }

        .submit-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #a01830, #6b0f20);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            margin-top: 8px;
            transition: opacity 0.2s, transform 0.1s;
            letter-spacing: 0.03em;
        }
        .submit-btn:hover { opacity: 0.92; }
        .submit-btn:active { transform: scale(0.99); }

        #result {
            display: none;
            margin-top: 20px;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            animation: fadeIn 0.4s ease;
        }
        .result-score {
            font-size: 2.2rem;
            font-weight: 700;
            line-height: 1;
            margin-bottom: 6px;
        }
        .result-label {
            font-size: 1rem;
            font-weight: 700;
            margin-bottom: 8px;
        }
        .result-desc {
            font-size: 0.85rem;
            line-height: 1.6;
        }
        .result-warning {
            background: #fdf0f0;
            border: 2px solid #8b1a2f;
            color: #5a0f1e;
        }
        .result-ok {
            background: #e8f5e9;
            border: 2px solid #43a047;
            color: #1b5e20;
        }

        .error-msg {
            color: #e53935;
            font-size: 0.82rem;
            margin-top: 10px;
            text-align: center;
            display: none;
        }
    </style>
</head>
<body>
<div class="card">
    <div class="header">
        <h2>🦶 발목 불안정성(CAI) 자가 진단</h2>
        <p>캡스톤 디자인: 발목 관리 프로그램 &nbsp;|&nbsp; 총 30점 만점</p>
        <div class="progress-bar-wrap">
            <div class="progress-bar-fill" id="progressBar"></div>
        </div>
        <div class="progress-label" id="progressLabel">0 / 10 응답</div>
    </div>

    <div class="body">
        <div id="quiz-container"></div>

        <button class="submit-btn" onclick="calculateScore()">나의 점수 확인하기</button>
        <p class="error-msg" id="errorMsg">⚠️ 모든 질문에 답해 주세요.</p>
        <div id="result"></div>
    </div>
</div>

<script>
const questions = [
    {
        text: "평지를 걸을 때 발목이 불안정하다고 느끼십니까?",
        options: [
            { label: "전혀 느끼지 않음", value: 3 },
            { label: "가끔", value: 2 },
            { label: "자주", value: 1 },
            { label: "항상 느낌", value: 0 }
        ]
    },
    {
        text: "울퉁불퉁한 길을 걸을 때 발목이 휘청거리거나 꺾입니까?",
        options: [
            { label: "전혀 없음", value: 3 },
            { label: "가끔", value: 2 },
            { label: "자주", value: 1 },
            { label: "매우 자주", value: 0 }
        ]
    },
    {
        text: "계단을 내려갈 때 발목이 불안정한 느낌이 듭니까?",
        options: [
            { label: "안정적임", value: 3 },
            { label: "약간 불안정", value: 2 },
            { label: "불안정함", value: 1 },
            { label: "매우 불안정", value: 0 }
        ]
    },
    {
        text: "갑자기 방향을 전환할 때 발목에 힘이 빠지는 느낌이 있습니까?",
        options: [
            { label: "없음", value: 3 },
            { label: "가끔", value: 2 },
            { label: "자주", value: 1 },
            { label: "자주 있음", value: 0 }
        ]
    },
    {
        text: "운동(달리기, 점프 등) 중 발목이 꺾일 것 같은 공포감을 느낍니까?",
        options: [
            { label: "전혀 없음", value: 3 },
            { label: "약간", value: 2 },
            { label: "있음", value: 1 },
            { label: "심각함", value: 0 }
        ]
    },
    {
        text: "과거에 발목을 삐었을 때, 완전히 회복되었다고 느끼십니까?",
        options: [
            { label: "완전히 회복", value: 3 },
            { label: "대부분 회복", value: 2 },
            { label: "일부 회복", value: 1 },
            { label: "전혀 아님", value: 0 }
        ]
    },
    {
        text: "한 발로 서 있을 때 중심을 잡기가 어렵습니까?",
        options: [
            { label: "쉬움", value: 3 },
            { label: "약간 어려움", value: 2 },
            { label: "어려움", value: 1 },
            { label: "매우 어려움", value: 0 }
        ]
    },
    {
        text: "발목 통증으로 인해 운동 강도를 줄인 적이 있습니까?",
        options: [
            { label: "없음", value: 3 },
            { label: "가끔", value: 2 },
            { label: "자주", value: 1 },
            { label: "자주 있음", value: 0 }
        ]
    },
    {
        text: "일상생활 중 발목이 '덜컥'거리는 느낌(Giving way)을 받습니까?",
        options: [
            { label: "전혀 없음", value: 3 },
            { label: "가끔", value: 2 },
            { label: "자주", value: 1 },
            { label: "매일 느낌", value: 0 }
        ]
    },
    {
        text: "까치발을 들거나 발가락으로 지탱할 때 불안정합니까?",
        options: [
            { label: "안정적임", value: 3 },
            { label: "약간 불안정", value: 2 },
            { label: "불안정함", value: 1 },
            { label: "지탱 불가", value: 0 }
        ]
    }
];

const answers = new Array(questions.length).fill(null);

function renderQuiz() {
    const container = document.getElementById('quiz-container');
    container.innerHTML = '';
    questions.forEach((q, qi) => {
        const div = document.createElement('div');
        div.className = 'question';
        div.innerHTML = `<p class="question-text"><span class="question-num">${qi + 1}</span>${q.text}</p>
        <div class="options" id="options-${qi}">
            ${q.options.map((opt, oi) => `
                <label class="option-label" id="label-${qi}-${oi}" onclick="selectOption(${qi}, ${oi}, ${opt.value})">
                    <input type="radio" name="q${qi}" value="${opt.value}">
                    ${opt.label}
                    <span class="score-badge">(${opt.value}점)</span>
                </label>
            `).join('')}
        </div>`;
        container.appendChild(div);
    });
}

function selectOption(qi, oi, value) {
    answers[qi] = value;

    // 해당 질문의 모든 label에서 selected 제거
    document.querySelectorAll(`#options-${qi} .option-label`).forEach(el => el.classList.remove('selected'));
    document.getElementById(`label-${qi}-${oi}`).classList.add('selected');

    // 진행도 업데이트
    const answered = answers.filter(a => a !== null).length;
    const pct = (answered / questions.length) * 100;
    document.getElementById('progressBar').style.width = pct + '%';
    document.getElementById('progressLabel').textContent = `${answered} / ${questions.length} 응답`;
}

function calculateScore() {
    const unanswered = answers.indexOf(null);
    const errorMsg = document.getElementById('errorMsg');

    if (unanswered !== -1) {
        errorMsg.style.display = 'block';
        // 미답변 질문으로 스크롤
        document.querySelectorAll('.question')[unanswered].scrollIntoView({ behavior: 'smooth', block: 'center' });
        return;
    }
    errorMsg.style.display = 'none';

    const total = answers.reduce((sum, v) => sum + v, 0);
    const resultDiv = document.getElementById('result');
    resultDiv.style.display = 'block';

    if (total <= 24) {
        resultDiv.className = 'result-warning';
        resultDiv.innerHTML = `
            <div class="result-score">${total}점 / 30점</div>
            <div class="result-label">⚠️ 만성 발목 불안정성(CAI) 의심</div>
            <div class="result-desc">24점 이하는 CAI 가능성이 있습니다.<br>발목 관리가 필요합니다.</div>
        `;
    } else {
        resultDiv.className = 'result-ok';
        resultDiv.innerHTML = `
            <div class="result-score">${total}점 / 30점</div>
            <div class="result-label">✅ 발목 상태 안정적</div>
            <div class="result-desc">현재 발목 상태가 비교적 안정적입니다.<br>꾸준한 스트레칭과 근력 운동으로 건강을 유지하세요!</div>
        `;
    }

    resultDiv.scrollIntoView({ behavior: 'smooth', block: 'center' });
}

renderQuiz();
</script>
</body>
</html>
