<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>발목 불안정성 자가 진단</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Noto Sans KR', sans-serif; background: #f8fafc; min-height: 100vh; display: flex; align-items: flex-start; justify-content: center; padding: 30px 16px; }
        .card { background: white; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); max-width: 600px; width: 100%; overflow: hidden; border: 1px solid #e2e8f0; }
        .header { background: linear-gradient(135deg, #8b1a2f, #5a0f1e); color: white; padding: 35px 30px; text-align: center; }
        .header h2 { font-size: 1.5rem; font-weight: 700; margin-bottom: 8px; letter-spacing: -0.02em; }
        .header p { font-size: 0.85rem; opacity: 0.9; font-weight: 400; }
        .progress-bar-wrap { background: rgba(255,255,255,0.2); border-radius: 99px; height: 8px; margin-top: 20px; }
        .progress-bar-fill { background: #ffffff; height: 8px; border-radius: 99px; transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1); width: 0%; }
        .body { padding: 30px; }
        .question { margin-bottom: 30px; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .question-text { font-size: 1rem; font-weight: 700; color: #1e293b; margin-bottom: 15px; line-height: 1.5; }
        .question-num { color: #8b1a2f; margin-right: 8px; font-style: normal; }
        .options { display: flex; flex-direction: column; gap: 10px; }
        .option-label { display: flex; align-items: center; padding: 14px 18px; border: 1.5px solid #e2e8f0; border-radius: 12px; cursor: pointer; transition: all 0.2s ease; font-size: 0.9rem; color: #475569; background: #ffffff; }
        .option-label:hover { border-color: #8b1a2f; background: #fff1f2; }
        .option-label input { display: none; }
        .option-label.selected { border-color: #8b1a2f; background: #8b1a2f; color: white; font-weight: 500; box-shadow: 0 4px 12px rgba(139, 26, 47, 0.2); }
        .submit-btn { width: 100%; padding: 18px; background: #8b1a2f; color: white; border: none; border-radius: 12px; font-size: 1.1rem; font-weight: 700; cursor: pointer; transition: all 0.2s; margin-top: 10px; box-shadow: 0 4px 15px rgba(139, 26, 47, 0.3); }
        .submit-btn:hover { background: #721526; transform: translateY(-2px); }
        #result { display: none; margin-top: 30px; padding: 25px; border-radius: 16px; text-align: center; }
        .result-score { font-size: 2.8rem; font-weight: 800; margin-bottom: 10px; color: #1e293b; }
        .result-warning { background: #fff1f2; border: 2px solid #fda4af; color: #9f1239; }
        .result-ok { background: #f0fdf4; border: 2px solid #86efac; color: #166534; }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <h2>발목 불안정성 자가 진단</h2>
        <p>캡스톤 디자인: 발목 관리 프로그램 (CAIT)</p>
        <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progressBar"></div></div>
    </div>
    <div class="body">
        <div id="quiz-container"></div>
        <button class="submit-btn" onclick="calculateScore()">결과 확인하기</button>
        <div id="result"></div>
    </div>
</div>

<script>
const questions = [
    { text: "발목에 통증이 있다.", options: [ {label:"전혀 느끼지 않는다", v:5}, {label:"운동할 때", v:4}, {label:"고르지 못한 지면을 달릴 때", v:3}, {label:"평탄한 지면을 달릴 때", v:2}, {label:"고르지 못한 지면에서 걸을 때", v:1}, {label:"평탄한 지면에서 걸을 때", v:0} ] },
    { text: "발목이 불안정하다.", options: [ {label:"전혀 느끼지 않는다", v:4}, {label:"운동할 때 가끔 그렇다(항상 그런 것은 아님)", v:3}, {label:"운동할 때 자주 그렇다(항상)", v:2}, {label:"일상생활 도중 가끔", v:1}, {label:"일상생활 도중 자주", v:0} ] },
    { text: "운동 중 갑자기 옆으로 움직이면 발목이 불안정하다.", options: [ {label:"전혀 그렇지 않다", v:3}, {label:"달리기할 때 가끔 그렇다", v:2}, {label:"달리기할 때 자주 그렇다", v:1}, {label:"걸을 때도 그렇다", v:0} ] },
    { text: "계단을 내려올 때면 발목이 불안정하다.", options: [ {label:"전혀 그렇지 않다", v:3}, {label:"빨리 내려올 때 그렇다", v:2}, {label:"가끔 그렇다", v:1}, {label:"항상 그렇다", v:0} ] },
    { text: "한 다리로 서면 발목이 불안정하다.", options: [ {label:"전혀 그렇지 않다", v:2}, {label:"발끝으로 서면 그렇다", v:1}, {label:"발바닥을 다 붙이고 서도 그렇다", v:0} ] },
    { text: "다음과 같은 동작 시 발목이 불안정하다.", options: [ {label:"전혀 그렇지 않다", v:3}, {label:"옆으로 뜀뛰기 할 때", v:2}, {label:"제자리에서 뜀뛰기 할 때", v:1}, {label:"높이 점프할 때", v:0} ] },
    { text: "다음과 같은 활동 시 발목이 불안정하다.", options: [ {label:"전혀 그렇지 않다", v:4}, {label:"고르지 못한 지면을 빨리 달릴 때", v:3}, {label:"고르지 못한 지면을 천천히 달릴 때", v:2}, {label:"고르지 못한 지면에서 걸을 때", v:1}, {label:"고른 지면에서 걸을 때", v:0} ] },
    { text: "발목이 한 번 접질리려 할 때, 스스로 멈출 수가 없다.", options: [ {label:"바로 멈출 수 있다", v:3}, {label:"일반적으로 멈출 수 있다", v:2}, {label:"가끔은 멈출 수 있다", v:1}, {label:"절대 멈출 수 없다", v:0}, {label:"발목을 접질린 적이 없다", v:3} ] },
    { text: "통상적인 발목 ‘접질림’이 있고난 후, 발목이 바로 ‘정상’으로 돌아온다.", options: [ {label:"거의 바로 정상으로 돌아온다", v:3}, {label:"하루 이내에 정상으로 돌아온다", v:2}, {label:"1-2일 안에 정상으로 돌아온다", v:1}, {label:"2일을 넘겨야 정상으로 돌아온다", v:0}, {label:"발목을 접질린 적이 없다", v:3} ] }
];

let answers = new Array(questions.length).fill(null);

function render() {
    const container = document.getElementById('quiz-container');
    questions.forEach((q, qi) => {
        const qDiv = document.createElement('div');
        qDiv.className = 'question';
        qDiv.innerHTML = `<p class="question-text"><em class="question-num">Q${qi+1}.</em>${q.text}</p>
        <div class="options">${q.options.map((opt, oi) => `
            <label class="option-label" id="L-${qi}-${oi}">
                <input type="radio" name="q${qi}" onclick="sel(${qi},${oi},${opt.v})"> ${opt.label}
            </label>`).join('')}</div>`;
        container.appendChild(qDiv);
    });
}

function sel(qi, oi, v) {
    answers[qi] = v;
    document.querySelectorAll(`[name="q${qi}"]`).forEach((el, i) => {
        document.getElementById(`L-${qi}-${i}`).classList.remove('selected');
    });
    document.getElementById(`L-${qi}-${oi}`).classList.add('selected');
    const count = answers.filter(a => a !== null).length;
    document.getElementById('progressBar').style.width = (count / questions.length) * 100 + '%';
}

function calculateScore() {
    if(answers.includes(null)) { alert('모든 문항에 답변해주세요!'); return; }
    const score = answers.reduce((a, b) => a + b, 0);
    const res = document.getElementById('result');
    res.style.display = 'block';
    if(score <= 24) {
        res.className = 'result-warning';
        res.innerHTML = `<div class="result-score">${score}점</div><strong>만성 발목 불안정성(CAI) 의심</strong><br>24점 이하는 관리가 필요한 상태입니다.`;
    } else {
        res.className = 'result-ok';
        res.innerHTML = `<div class="result-score">${score}점</div><strong>발목 상태 양호</strong><br>현재 발목이 비교적 안정적인 상태입니다.`;
    }
    res.scrollIntoView({behavior: 'smooth'});
}
render();
</script>
</body>
</html>
